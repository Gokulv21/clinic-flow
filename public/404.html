<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Prescripto</title>
    <!-- 
      This script handles routing for Single Page Applications (SPAs) on GitHub Pages.
      If a user directly visits a path like `/clinic-flow/login`, GitHub Pages will normally return a 404
      because the physical file does not exist.
      This 404.html file catches that error, preserves the URL path, and redirects
      the browser back to the index.html file so React Router can process the route.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1; // 1 because the repo name 'prescripto' is the first segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    Loading...
  </body>
</html>
