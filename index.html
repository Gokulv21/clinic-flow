    <!-- 
      This script catches the redirect from the 404.html page (for GitHub Pages routing).
      It takes the query parameters and path information generated by 404.html
      and uses history.replaceState to restore the clean URL for React Router.
    -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" crossorigin src="/clinic-flow/assets/index-CBT8imhE.js"></script>
    <link rel="stylesheet" crossorigin href="/clinic-flow/assets/index-DIbNKmgW.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
