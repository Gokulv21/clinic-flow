services:
  livekit:
    image: livekit/livekit-server:v1.5
    command: --config /etc/livekit.yaml
    restart: always
    # On Windows/WSL2, 'host' network mode might have issues. 
    # For a VPS, always use 'network_mode: host'.
    # Here we expose ports explicitly for local testing.
    ports:
      - "7880:7880"   # HTTP/WebSocket
      - "7881:7881"   # TCP RTC
      - "7882:7882/udp" # UDP RTC
      - "3478:3478/udp" # TURN UDP
      - "5349:5349/tcp" # TURN TLS
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
